# Global configuration for quant_lab.
# Paths use forward slashes (Windows-friendly via pathlib).
#
# All path fields here can be overridden by environment variables (see .env.example):
#   QUANT_LAB_DATA_PATH       overrides data_storage_path
#   QUANT_LAB_BONDS_DB_PATH   overrides bonds_db_path
#   GDS_DB_PATH               overrides duckdb_path
#
# Default behaviour when ALL fields are null:
#   data_storage_path → <repo>/data_storage
#   bonds_db_path     → <data_storage_path>/bonds/bonds.db
#   duckdb_path       → ~/.global_data_storage/store.duckdb
#
# These defaults make the repo work on a fresh clone without edits.

data_storage_path: null   # null → <repo>/data_storage. Override via env QUANT_LAB_DATA_PATH.
duckdb_path: null         # null → ~/.global_data_storage/store.duckdb. Override via env GDS_DB_PATH.
bonds_db_path: null       # null → <data_storage_path>/bonds/bonds.db. Override via env QUANT_LAB_BONDS_DB_PATH.

default_currency: "EUR"
initial_capital_eur: 50000

fees:
  default_commission_bps: 5
  default_slippage_bps: 5
  default_slippage_model: "linear_bps"
  sqrt_impact_kappa: 0.10

outputs_dir: "outputs"
logs_dir: "logs"
