# Quality Stocks parameters — V5 SURVIVORSHIP-CORRECTED variant.
# Identical to v5_combined PLUS the survivorship-aware universe flag.
# Strategy parameters are NOT touched; only the candidate set at each
# rebalance is constrained to "constituents as of the rebalance date".

strategy_id: quality_stocks_v5_surv
universe: sp500_ex_financials

# Selection (same as v5_combined)
target_securities: 20
quality_pool: 50
momentum_lookback: 60        # V3 — shorter momentum
momentum_skip: 5

# Trend filter (V2 — faster)
trend_short_ma: 20
trend_long_ma: 100
trend_reference: SPY

# Bond fallback (V4 — null = cash in bear regime)
bond_fallback: null

# Quality score weights
quality_weights:
  roic: 1.0
  fcf_yield: 1.0
  cash_return: 1.0
  inv_debt_eq: 1.0
  stable_roic: 1.0

# Sizing
capital_per_position_eur: 5000
initial_capital_eur: 100000

# Rebalancing
rebalance_frequency: monthly

# Sectors to exclude
exclude_sectors:
  - "Financial Services"

# Costs
commission_bps: 5
slippage_bps: 5
slippage_model: linear_bps

# ----- SURVIVORSHIP CORRECTION (Phase S) -------------------------------
# When `survivorship_aware: true` the strategy queries
# `FMPProvider.get_constituents_at_date("sp500", date)` at each rebalance
# instead of using today's index members. This removes the "future
# winners" leakage from older backtest folds. See
# `_migration_log/V5_SURVIVORSHIP_VALIDATION_REPORT.md`.
survivorship_aware: true
universe_mode: point_in_time
