# Quality Stocks parameters — variant V4: no bond fallback.
# Hypothesis: the IEF parking in 2022 hurt more than it helped (rates were
# rising; IEF lost ~15%). Cash within the sleeve avoids the bond drawdown
# while keeping the equity-only profile.
# Everything else identical to baseline.

strategy_id: quality_stocks_v4
universe: sp500_ex_financials

# Selection
target_securities: 20
quality_pool: 50
momentum_lookback: 126
momentum_skip: 10

# Trend filter (baseline)
trend_short_ma: 50
trend_long_ma: 200
trend_reference: SPY

# Bond fallback — DISABLED
bond_fallback: null   # was IEF; null = cash within sleeve in bear regime

# Quality score weights
quality_weights:
  roic: 1.0
  fcf_yield: 1.0
  cash_return: 1.0
  inv_debt_eq: 1.0
  stable_roic: 1.0

# Sizing
capital_per_position_eur: 5000
initial_capital_eur: 100000

# Rebalancing
rebalance_frequency: monthly

# Sectors to exclude
exclude_sectors:
  - "Financial Services"

# Costs
commission_bps: 5
slippage_bps: 5
slippage_model: linear_bps
