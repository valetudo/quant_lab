# Quality Stocks parameters — variant V3: shorter momentum window.
# Hypothesis: 6-month (126/10) momentum is too slow for the 2020-2024
# whip-saw market; 3-month (60/5) momentum is more reactive.
# Everything else identical to baseline.

strategy_id: quality_stocks_v3
universe: sp500_ex_financials

# Selection
target_securities: 20
quality_pool: 50
momentum_lookback: 60   # was 126
momentum_skip: 5         # was 10

# Trend filter (baseline)
trend_short_ma: 50
trend_long_ma: 200
trend_reference: SPY

# Bond fallback
bond_fallback: IEF

# Quality score weights
quality_weights:
  roic: 1.0
  fcf_yield: 1.0
  cash_return: 1.0
  inv_debt_eq: 1.0
  stable_roic: 1.0

# Sizing
capital_per_position_eur: 5000
initial_capital_eur: 100000

# Rebalancing
rebalance_frequency: monthly

# Sectors to exclude
exclude_sectors:
  - "Financial Services"

# Costs
commission_bps: 5
slippage_bps: 5
slippage_model: linear_bps
