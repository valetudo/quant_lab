# Quality Stocks parameters — variant V5: V2 + V3 + V4 combined.
# Faster trend (20/100) + shorter momentum (60/5) + no bond fallback.
# Hypothesis: stacking the three modifications may have synergy — or it
# may compound noise. Will tell us whether the modifications are
# independent or correlated in their effect.

strategy_id: quality_stocks_v5
universe: sp500_ex_financials

# Selection
target_securities: 20
quality_pool: 50
momentum_lookback: 60   # V3
momentum_skip: 5         # V3

# Trend filter (V2)
trend_short_ma: 20
trend_long_ma: 100
trend_reference: SPY

# Bond fallback (V4)
bond_fallback: null

# Quality score weights
quality_weights:
  roic: 1.0
  fcf_yield: 1.0
  cash_return: 1.0
  inv_debt_eq: 1.0
  stable_roic: 1.0

# Sizing
capital_per_position_eur: 5000
initial_capital_eur: 100000

# Rebalancing
rebalance_frequency: monthly

# Sectors to exclude
exclude_sectors:
  - "Financial Services"

# Costs
commission_bps: 5
slippage_bps: 5
slippage_model: linear_bps
